<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ LIGHTNING BACCARAT ⚡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header>
            <h1 class="lightning-title">⚡ LIGHTNING BACCARAT ⚡</h1>
            <div class="scoreboard">
                <div class="stat-box">내 자산: <span id="balance">1,000,000</span> 원</div>
                <div class="stat-box">현재 베팅: [<span id="current-bet-type">없음</span>] <span id="bet-amount">10,000</span> 원</div>
            </div>
        </header>

        <main class="table-area">
            <div class="bet-side player-side">
                <h2>PLAYER</h2>
                <div class="score" id="player-score">0</div>
                <div class="card-zone" id="player-cards"></div>
            </div>

            <div class="bet-side banker-side">
                <h2>BANKER</h2>
                <div class="score" id="banker-score">0</div>
                <div class="card-zone" id="banker-cards"></div>
            </div>
        </main>

        <section class="lightning-zone">
            <h3>⚡ LIGHTNING CARDS ⚡</h3>
            <div class="lightning-cards-container" id="lightning-cards">
                <div class="no-lightning">베팅 후 DEAL을 누르면 번개가 내리칩니다!</div>
            </div>
        </section>

        <div class="result-banner" id="result-text">원하는 곳에 베팅 후 DEAL을 시작하세요!</div>

        <footer class="bottom-zone">
            <div class="control-panel">
                <div class="bet-options">
                    <button class="bet-btn btn-p" onclick="selectBet('PLAYER')">PLAYER <span class="rate">2배~</span></button>
                    <button class="bet-btn btn-t" onclick="selectBet('TIE')">TIE <span class="rate">9배~</span></button>
                    <button class="bet-btn btn-b" onclick="selectBet('BANKER')">BANKER <span class="rate">2배~</span></button>
                </div>
                <div class="bet-amount-control">
                    <button class="amount-btn" onclick="changeBetAmount(-10000)">- 1만</button>
                    <button class="amount-btn" onclick="changeBetAmount(10000)">+ 1만</button>
                    <button class="amount-btn all-in" onclick="changeBetAmount('ALL')">ALL IN</button>
                </div>
                <button class="action-btn deal-trigger" id="deal-btn" onclick="playGame()" disabled>DEAL 🃏</button>
            </div>

            <div class="roadmap-wrapper">
                <div class="roadmap-header">
                    <h4>📊 경기 기록 (출목표)</h4>
                    <div class="summary">
                        P:<span id="count-p">0</span> | B:<span id="count-b">0</span> | T:<span id="count-t">0</span>
                    </div>
                </div>
                <div class="roadmap-grid" id="roadmap-grid"></div>
            </div>
        </footer>
    </div>

    <div class="lightning-flash" id="flash-screen"></div>

    <script src="script.js"></script>
</body>
</html>
